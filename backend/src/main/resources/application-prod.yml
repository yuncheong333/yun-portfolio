server:
  port: 8080

spring:
  datasource:
    url : jdbc:postgresql://aws-0-ap-northeast-2.pooler.supabase.com:6543/postgres?user=postgres.cityuxxvfbfznctyhrkp
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  file:
    upload-dir: /uploads/

logging:
  level:
    root: INFO
    com.yuncheong.backend: INFO
  file:
    name: logs/application.log

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  remember-me-expiration: 2592000000
  refresh-expiration: 604800000
